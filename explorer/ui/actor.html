<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Actor — cti-stitcher</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="shell">

  <nav class="topbar">
    <span class="topbar-logo">cti-stitcher</span>
    <div class="topbar-nav">
      <a href="/">Explorer</a>
      <a href="/controls">Controls</a>
      <a href="/gap-analysis">Gap Analysis</a>
      <a href="/d3fend">D3FEND</a>
      <a href="/settings">Connectors</a>
    </div>
    <span class="sync-status" id="sync-status"></span>
  </nav>

  <main class="content">
    <div id="profile-root"><div class="loading">Loading...</div></div>
  </main>

</div>

<script src="/static/app.js"></script>
<script>
const actorId = window.location.pathname.split("/").pop();

const TACTIC_ORDER = [
  "reconnaissance", "resource-development", "initial-access", "execution",
  "persistence", "privilege-escalation", "defense-evasion", "credential-access",
  "discovery", "lateral-movement", "collection", "command-and-control",
  "exfiltration", "impact", "unknown"
];

function tacticLabel(t) {
  return t.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

async function load() {
  const root = document.getElementById("profile-root");
  try {
    const a = await API.get(`/api/actors/${actorId}`);
    document.title = `${a.name} — cti-stitcher`;

    const flag = countryFlag(a.country_code);
    const country = countryName(a.country_code);

    // Header
    const attackLink = a.mitre_url
      ? `<a class="btn btn-ghost" href="${a.mitre_url}" target="_blank">MITRE ATT&CK ↗</a>` : "";

    // Aliases section
    const aliasRows = a.aliases.map(al => `
      <div class="alias-row">
        <span class="alias-name">${al.alias}</span>
        <span class="alias-source">${al.source}</span>
        ${confidenceBadge(al.confidence)}
      </div>
    `).join("") || "<div style='color:var(--text-dim)'>No additional aliases recorded.</div>";

    // Techniques by tactic
    const tacticKeys = Object.keys(a.techniques_by_tactic).sort((a, b) => {
      const ai = TACTIC_ORDER.indexOf(a), bi = TACTIC_ORDER.indexOf(b);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });

    const tacticBlocks = tacticKeys.map(tactic => {
      const techniques = a.techniques_by_tactic[tactic];
      const rows = techniques.map(t => {
        const controlBadges = (t.controls || []).map(c =>
          `<span class="control-badge" title="${c.name}">${c.control_id}</span>`
        ).join("");
        return `
        <div class="technique-item">
          <div class="technique-row">
            <span class="technique-id">${t.attack_id}</span>
            <span>${t.name}</span>
            ${t.is_subtechnique ? tag("sub", "") : ""}
          </div>
          ${controlBadges ? `<div class="technique-controls">${controlBadges}</div>` : ""}
        </div>
      `;
      }).join("");
      return `
        <div class="tactic-block">
          <div class="tactic-name">${tacticLabel(tactic)}</div>
          ${rows}
        </div>
      `;
    }).join("") || "<div style='color:var(--text-dim)'>No techniques recorded.</div>";

    // Software
    const softwarePills = a.software.map(sw =>
      `<span class="tag ${sw.type === 'malware' ? 'tag-warn' : ''}">${sw.name}</span>`
    ).join("") || "<span style='color:var(--text-dim)'>None recorded.</span>";

    // Targeting
    const industries = a.targeting.industries.map(i => `<span class="tag">${i}</span>`).join("") || "—";
    const countries = [...a.targeting.regions, ...a.targeting.countries]
      .map(c => `<span class="tag">${c}</span>`).join("") || "—";

    root.innerHTML = `
      <div style="margin-bottom:12px">
        <a href="/" style="color:var(--text-dim);font-size:13px">← Back to Explorer</a>
      </div>

      <div class="profile-header">
        <div>
          <div class="profile-name">
            <span class="flag">${flag}</span> ${a.name}
            ${a.attack_group_id ? `<span class="tag tag-accent" style="font-size:14px;margin-left:8px">${a.attack_group_id}</span>` : ""}
          </div>
          <div class="profile-meta">
            <span>${country}</span>
            ${a.first_seen ? `<span>First seen: ${a.first_seen.slice(0,10)}</span>` : ""}
            ${a.last_seen ? `<span>Last seen: ${a.last_seen.slice(0,10)}</span>` : ""}
            <span>${a.technique_count} TTPs · ${a.software.length} tools/malware</span>
            ${!a.in_attack ? `<span class="tag tag-warn">Not in ATT&CK</span>` : ""}
          </div>
        </div>
        <div class="profile-links">${attackLink}</div>
      </div>

      ${a.description ? `
      <div class="section">
        <div class="section-title">Description</div>
        <p style="color:var(--text-dim);font-size:13px;line-height:1.7">${a.description}</p>
      </div>` : ""}

      <div class="section">
        <div class="section-title">Known Aliases (${a.aliases.length})</div>
        <div class="alias-grid">${aliasRows}</div>
      </div>

      <div class="section">
        <div class="section-title">Targeting</div>
        <div style="margin-bottom:8px">
          <span style="font-size:12px;color:var(--text-dim);margin-right:8px">INDUSTRIES</span>${industries}
        </div>
        <div>
          <span style="font-size:12px;color:var(--text-dim);margin-right:8px">REGIONS / COUNTRIES</span>${countries}
        </div>
      </div>

      <div class="section">
        <div class="section-title">Techniques (${a.technique_count})</div>
        ${tacticBlocks}
      </div>

      <div class="section">
        <div class="section-title">Tools & Malware (${a.software.length})</div>
        <div class="software-grid">${softwarePills}</div>
      </div>
    `;
  } catch (e) {
    root.innerHTML = `<div class="empty-state">Failed to load actor: ${e.message}</div>`;
  }
}

load
