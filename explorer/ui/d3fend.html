<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D3FEND — cti-stitcher</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="shell">

  <nav class="topbar">
    <span class="topbar-logo">cti-stitcher</span>
    <div class="topbar-nav">
      <a href="/">Explorer</a>
      <a href="/d3fend" class="active">D3FEND</a>
      <a href="/controls">Controls</a>
      <a href="/gap-analysis">Gap Analysis</a>
      <a href="/rank">Risk Rank</a>
      <a href="/settings">Connectors</a>
    </div>
    <span class="sync-status" id="sync-status"></span>
  </nav>

  <main class="content">
    <div style="margin-bottom:20px">
      <h1 style="font-size:20px;font-weight:700;margin-bottom:4px">D3FEND Countermeasures</h1>
      <p style="color:var(--text-dim);font-size:13px">
        MITRE D3FEND defensive techniques mapped to ATT&amp;CK. Mark what you've deployed to
        see detection coverage in <a href="/gap-analysis">Gap Analysis</a>.
      </p>
    </div>

    <!-- Tactic filter pills -->
    <div class="family-pills" id="tactic-pills">
      <button class="family-pill active" data-tactic="ALL" onclick="setTactic('ALL', this)">All</button>
      <button class="family-pill" data-tactic="Harden"  onclick="setTactic('Harden', this)">Harden</button>
      <button class="family-pill" data-tactic="Detect"  onclick="setTactic('Detect', this)">Detect</button>
      <button class="family-pill" data-tactic="Isolate" onclick="setTactic('Isolate', this)">Isolate</button>
      <button class="family-pill" data-tactic="Deceive" onclick="setTactic('Deceive', this)">Deceive</button>
      <button class="family-pill" data-tactic="Evict"   onclick="setTactic('Evict', this)">Evict</button>
      <button class="family-pill" data-tactic="Restore" onclick="setTactic('Restore', this)">Restore</button>
    </div>

    <!-- Stats bar — counts reflect current filter -->
    <div style="display:flex;gap:20px;margin:16px 0;font-size:13px;color:var(--text-dim);align-items:center;flex-wrap:wrap">
      <span id="stat-total"></span>
      <span id="stat-deployed" style="color:var(--success)"></span>
      <span id="stat-partial"  style="color:#f59e0b"></span>
      <a href="/gap-analysis" class="btn btn-primary" style="margin-left:auto;font-size:12px;padding:4px 12px">
        Run Gap Analysis →
      </a>
    </div>

    <!-- Countermeasure grid -->
    <div id="cm-root"><div class="loading">Loading countermeasures...</div></div>

  </main>
</div>

<script src="/static/app.js"></script>
<script>
let allCM = [];
let activeTactic = "ALL";

const TACTIC_COLORS = {
  Harden:  "var(--warn)",
  Detect:  "#7c6fcd",
  Isolate: "var(--accent)",
  Deceive: "#c084fc",
  Evict:   "var(--danger)",
  Restore: "var(--success)",
};

function setTactic(tactic, btn) {
  activeTactic = tactic;
  document.querySelectorAll(".family-pill").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function statusLabel(s) {
  if (s === "deployed") return "✓ Deployed";
  if (s === "partial")  return "~ Partial";
  return "Mark deployed";
}

function statusClass(s) {
  if (s === "deployed") return "posture-toggle posture-on";
  if (s === "partial")  return "posture-toggle posture-partial";
  return "posture-toggle";
}

function cardImplClass(s) {
  if (s === "deployed") return "control-card-impl";
  if (s === "partial")  return "control-card-partial";
  return "";
}

function render() {
  const root = document.getElementById("cm-root");

  // Filter to active tactic
  const visible = activeTactic === "ALL"
    ? allCM
    : allCM.filter(c => c.tactic === activeTactic);

  // Stats reflect ONLY the visible (filtered) set
  const deployedCount = visible.filter(c => c.status === "deployed").length;
  const partialCount  = visible.filter(c => c.status === "partial").length;

  document.getElementById("stat-total").textContent =
    `${visible.length} countermeasure${visible.length !== 1 ? "s" : ""}`;
  document.getElementById("stat-deployed").textContent =
    deployedCount ? `${deployedCount} deployed` : "";
  document.getElementById("stat-partial").textContent =
    partialCount  ? `${partialCount} partial`   : "";

  if (!visible.length) {
    root.innerHTML = `<div class="empty-state">No countermeasures in this category.</div>`;
    return;
  }

  root.innerHTML = visible.map(cm => {
    const color   = TACTIC_COLORS[cm.tactic] || "var(--text-dim)";
    const implCls = cardImplClass(cm.status);
    const safeid  = cm.d3fend_id.replace(/[^a-z0-9]/gi, "_");
    return `
      <div class="control-card ${implCls}" id="cm-${safeid}">
        <div class="control-card-left" style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span class="tag" style="font-size:10px;background:${color}20;color:${color};border-color:${color}40;flex-shrink:0">${cm.tactic}</span>
            <span style="font-size:11px;color:var(--text-dim);font-family:var(--mono)">${cm.d3fend_id}</span>
            <a href="https://d3fend.mitre.org/technique/${cm.d3fend_id}/" target="_blank"
               style="font-size:10px;color:var(--text-dim);text-decoration:underline;flex-shrink:0">↗</a>
          </div>
          <span class="control-card-name">${cm.name}</span>
          ${cm.definition ? `<p style="font-size:12px;color:var(--text-dim);margin-top:4px;line-height:1.5">${cm.definition}</p>` : ""}
        </div>
        <div class="control-card-right" style="flex-shrink:0">
          <span class="control-stat" title="ATT&CK techniques addressed">
            <span class="control-stat-num">${cm.technique_count}</span>
            <span class="control-stat-label">techniques</span>
          </span>
          <button
            class="${statusClass(cm.status)}"
            onclick="toggleCM(event, '${cm.d3fend_id}')"
            title="Cycle: not deployed → partial → deployed"
          >${statusLabel(cm.status)}</button>
        </div>
      </div>`;
  }).join("");
}

async function toggleCM(event, d3fendId) {
  event.preventDefault();
  const btn = event.currentTarget;
  btn.disabled = true;
  try {
    const data = await API.post(`/api/d3fend/${encodeURIComponent(d3fendId)}/toggle`);

    // Update in-memory state
    const cm = allCM.find(c => c.d3fend_id === d3fendId);
    if (cm) cm.status = data.status;

    // Update card DOM without full re-render
    const safeid = d3fendId.replace(/[^a-z0-9]/gi, "_");
    const card = document.getElementById(`cm-${safeid}`);
    if (card) {
      card.classList.remove("control-card-impl", "control-card-partial");
      const ic = cardImplClass(data.status);
      if (ic) card.classList.add(ic);
      btn.textContent = statusLabel(data.status);
      btn.className   = statusClass(data.status);
    }

    // Refresh stats bar to reflect new state in current filter
    const visible = activeTactic === "ALL"
      ? allCM
      : allCM.filter(c => c.tactic === activeTactic);
    const deployedCount = visible.filter(c => c.status === "deployed").length;
    const partialCount  = visible.filter(c => c.status === "partial").length;
    document.getElementById("stat-deployed").textContent =
      deployedCount ? `${deployedCount} deployed` : "";
    document.getElementById("stat-partial").textContent =
      partialCount  ? `${partialCount} partial`   : "";

  } catch(e) {
    console.error("Toggle failed", e);
  } finally {
    btn.disabled = false;
  }
}

async function load() {
  try {
    allCM = await API.get("/api/d3fend/countermeasures");
    render();
  } catch(e) {
    document.getElementById("cm-root").innerHTML =
      `<div class="empty-state">Failed to load: ${e.message}. Run a sync first.</div>`;
  }
}

// Extend API with POST support
API.post = async (path) => {
  const resp = await fetch(path, { method: "POST" });
  if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
  return resp.json();
};

loadSyncStatus(document.getElementById("sync-status"));
load();
</script>
</body>
</html>
